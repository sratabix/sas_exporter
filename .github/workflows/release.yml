name: CI

on:
  push:
    branches: ["**"]
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "$out"
            echo "::error::gofmt found issues; run 'gofmt -w .'"
            exit 1
          fi

      - run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

      - name: Cross-build linux/amd64+arm64
        run: |
          mkdir -p dist
          ver="dev-${GITHUB_SHA::7}"
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch \
              go build -trimpath -ldflags "-s -w -X main.version=${ver}" \
              -o dist/sas_exporter_linux_${arch} .
          done

      - name: Upload dev build
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: sas_exporter-dev-${{ github.sha }}
          path: dist/sas_exporter_linux_*
          retention-days: 14

  release:
    name: Publish release
    needs: ci
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir dist
          for arch in amd64 arm64; do
            GOOS=linux GOARCH=$arch CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
              -o dist/sas_exporter_linux_${arch} .
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
